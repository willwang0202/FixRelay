name: FixRelay

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  fixrelay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run your scanners before this step and write SARIF/JSON artifacts.
      # Examples:
      # - semgrep.sarif
      # - codeql.sarif
      # - gitleaks.sarif
      # - trivy.sarif

      - name: Run FixRelay
        if: ${{ hashFiles('semgrep.sarif') != '' }}
        uses: ./
        with:
          sarif: semgrep.sarif
          diff: origin/${{ github.base_ref }}...HEAD
          fail-on: high
          post-comment: true
          protected-paths: |
            auth/
            billing/
            infra/
            .github/workflows/
