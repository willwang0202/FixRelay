name: FixRelay
description: "Score PR merge risk from scanner findings and generate AI fix prompts."
inputs:
  run-semgrep:
    description: "Run Semgrep free audit automatically when no sarif or scanner-json inputs are provided."
    required: false
    default: 'true'
  semgrep-config:
    description: "Semgrep config to pass to --config. Defaults to auto."
    required: false
    default: 'auto'
  sarif:
    description: "Newline or comma separated SARIF files to load."
    required: false
    default: ''
  scanner-json:
    description: "Newline or comma separated generic scanner JSON files to load."
    required: false
    default: ''
  diff:
    description: "Git diff range, such as origin/main...HEAD."
    required: false
    default: ''
  diff-file:
    description: "Path to a saved unified diff file."
    required: false
    default: ''
  out-dir:
    description: "Directory where FixRelay artifacts are written."
    required: false
    default: fixrelay-out
  fail-on:
    description: "Risk threshold that fails the check: low, medium, high, critical, unknown, or never."
    required: false
    default: high
  post-comment:
    description: "Whether to post or update a FixRelay PR comment."
    required: false
    default: 'true'
  scope:
    description: "Finding scope: pr for changed-file findings, or entire-repo for all scanner findings."
    required: false
    default: pr
  protected-paths:
    description: "Newline or comma separated protected path prefixes."
    required: false
    default: |
      auth/
      billing/
      infra/
      .github/workflows/
  package-manager:
    description: "Package manager for validation command hints."
    required: false
    default: ''
  llm-review:
    description: "Enable optional LLM triage pass. Requires llm-endpoint, llm-model, and LLM_API_KEY env var."
    required: false
    default: 'false'
  llm-endpoint:
    description: "OpenAI-compatible endpoint base URL, such as https://api.anthropic.com or a LiteLLM proxy."
    required: false
    default: ''
  llm-model:
    description: "Model name to pass to the endpoint, such as claude-sonnet-4-6 or gpt-4o-mini."
    required: false
    default: ''
  llm-timeout-ms:
    description: "Milliseconds before the LLM call times out. Defaults to 20000."
    required: false
    default: '20000'
  llm-max-snippet-lines:
    description: "Maximum lines of code to include per finding in the LLM prompt. Defaults to 40."
    required: false
    default: '40'
outputs:
  risk:
    description: "Calculated merge risk level."
  decision:
    description: "Merge decision: allow, warn, or block."
  report:
    description: "Absolute path to merge-risk-report.md."
  tasks:
    description: "Absolute path to agent-fix-tasks.json."
  findings:
    description: "Absolute path to normalized-findings.json."
  prompt:
    description: "Absolute path to prompt.md."
  llm-review-artifact:
    description: "Absolute path to llm-review.json. Only set when llm-review is true and the call succeeds."
branding:
  icon: shield
  color: red
runs:
  using: node20
  main: github-action/index.js
